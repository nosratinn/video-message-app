<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Video Message</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    background: #0f0f10;
    color: #ffffff;
    font-family: Arial, sans-serif;
    height: 100%;
}
body {
    text-align: center;
}
.wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px;
}
.screen {
    display: none;
}
.screen.active {
    display: block;
}
h1, h2 {
    margin: 16px 0;
}
.msg {
    margin: 14px 0;
    font-size: 18px;
    color: #ff7070;
    min-height: 24px;
}
.btn {
    display: inline-block;
    width: 220px;
    min-height: 64px;
    line-height: 64px;
    margin: 12px auto;
    font-size: 28px;
    font-weight: bold;
    border-radius: 14px;
    border: none;
    background: #ff3b30;
    color: #fff;
}
.btn.secondary {
    background: #33383f;
}
.timer {
    font-size: 92px;
    font-weight: bold;
    margin: 30px 0;
    color: #ffd54a;
}
.sub {
    font-size: 22px;
    color: #d5d5d5;
}
video {
    display: block;
    width: 100%;
    max-width: 420px;
    height: auto;
    background: #000;
    border-radius: 12px;
    margin: 16px auto;
}
.note {
    font-size: 15px;
    color: #bdbdbd;
    line-height: 1.4;
    margin-top: 12px;
}
.hidden-input {
    position: absolute;
    left: -9999px;
}
</style>
</head>
<body>
<div class="wrap">

    <div id="mainScreen" class="screen active">
        <h1>Record up to a minute long message</h1>
        <div class="sub">Dark party mode</div>
        <button id="startBtn" class="btn">START</button>
        <div class="note">On older iPads, recording opens the built-in camera after the countdown.</div>
    </div>

    <div id="countdownScreen" class="screen">
        <div id="countdownNum" class="timer">10</div>
        <div class="sub">Get ready</div>
    </div>

    <div id="recordScreen" class="screen">
        <video id="preview" autoplay muted playsinline></video>
        <div id="recordTimer" class="sub">00:00 / 01:00</div>
        <button id="finishBtn" class="btn secondary">FINISH</button>
    </div>

    <div id="reviewScreen" class="screen">
        <h2>Review</h2>
        <video id="reviewVideo" controls playsinline></video>
        <button id="saveBtn" class="btn">Save Message!</button>
        <button id="discardBtn" class="btn secondary">Redo the video</button>
        <div id="saveMsg" class="msg"></div>
    </div>

    <input id="nativeCapture" class="hidden-input" type="file" accept="video/*" capture="user">

</div>
